name: Fetch Mar 1-9 2026 Crypto Data

on:
  push:
    branches:
      - claude/expand-crypto-data-DwV6r

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Fetch Mar 1-9 data with multi-source fallback
        run: python fetch_march_data.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Fetched_Data/*crypto*.csv 2>/dev/null || true
          git add -f MarketPatterns_AI/Fetched_Data/*crypto*.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "Add Mar 1-9 2026 crypto M5 data for BTC and ETH"
          git push
