name: Backfill Crypto M5 Data

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Run crypto backfill
        run: |
          python backfill_crypto.py \
            --source binance \
            --data-dir Fetched_Data \
            --also-update-fetched-data

      - name: Commit and push CSV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Fetched_Data/*crypto*.csv 2>/dev/null || true
          git add -f MarketPatterns_AI/Fetched_Data/*crypto*.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "Update crypto M5 historical data (backfill)"
          git push
