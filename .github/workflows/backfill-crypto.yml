name: Backfill Crypto M5 Data

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/expand-crypto-data-DwV6r'
    paths:
      - '.github/workflows/backfill-crypto.yml'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Run crypto backfill (Binance)
        run: |
          python backfill_crypto.py \
            --source binance \
            --data-dir Fetched_Data \
            --also-update-fetched-data \
            2>&1 | tee backfill_output.log

      - name: Show results and list generated files
        run: |
          echo "=== Backfill Summary ==="
          tail -80 backfill_output.log
          echo ""
          echo "=== All generated files ==="
          find . -name "*crypto*" -type f | sort
          echo ""
          echo "=== Row counts ==="
          find . -name "*crypto*.csv" -type f | while read f; do
            lines=$(wc -l < "$f")
            echo "$f: $lines lines"
            head -2 "$f"
            echo "..."
            tail -2 "$f"
            echo ""
          done
          echo "=== Git status ==="
          git status

      - name: Upload backfill log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backfill-log
          path: backfill_output.log

      - name: Upload CSV data as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crypto-csv-data
          path: |
            Fetched_Data/
            MarketPatterns_AI/Fetched_Data/
          if-no-files-found: warn

      - name: Commit and push CSV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add all CSV files explicitly by finding them
          find Fetched_Data -name "*crypto*.csv" -exec git add {} \; 2>/dev/null || true
          find MarketPatterns_AI/Fetched_Data -name "*crypto*.csv" -exec git add {} \; 2>/dev/null || true

          echo "=== Staged files ==="
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "WARNING: No files staged for commit"
            echo "Checking if files exist..."
            find . -name "*crypto*.csv" -type f -ls
            exit 0
          fi

          git commit -m "Add 12-month M5 historical data for ETH and BTC (Binance backfill)"

          echo "=== Pushing to branch ==="
          git push
          echo "=== Push successful ==="
