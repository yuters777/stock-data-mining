name: Backfill Crypto M5 Data

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/expand-crypto-data-DwV6r'
    paths:
      - '.github/workflows/backfill-crypto.yml'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Create output directories
        run: |
          mkdir -p Fetched_Data
          mkdir -p MarketPatterns_AI/Fetched_Data

      - name: Run crypto backfill (Binance)
        run: |
          python backfill_crypto.py \
            --source binance \
            --data-dir Fetched_Data \
            --also-update-fetched-data \
            2>&1 | tee backfill_output.log

      - name: Show results
        run: |
          echo "=== Backfill Results ==="
          tail -80 backfill_output.log
          echo ""
          echo "=== File listing ==="
          ls -lh Fetched_Data/*crypto* 2>/dev/null || echo "No crypto files in Fetched_Data"
          ls -lh MarketPatterns_AI/Fetched_Data/*crypto* 2>/dev/null || echo "No crypto files in MarketPatterns_AI"
          echo ""
          echo "=== Row counts ==="
          for f in Fetched_Data/*crypto*.csv MarketPatterns_AI/Fetched_Data/*crypto*.csv; do
            if [ -f "$f" ]; then
              lines=$(wc -l < "$f")
              echo "$f: $lines lines"
              head -2 "$f"
              echo "..."
              tail -2 "$f"
              echo ""
            fi
          done

      - name: Upload backfill log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backfill-log
          path: backfill_output.log

      - name: Upload CSV data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-csv-data
          path: Fetched_Data/*crypto*.csv
          if-no-files-found: warn

      - name: Commit and push CSV data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add 12-month M5 historical data for ETH and BTC (Binance backfill)"
          file_pattern: "Fetched_Data/*crypto*.csv MarketPatterns_AI/Fetched_Data/*crypto*.csv"
