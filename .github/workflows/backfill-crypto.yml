name: Backfill Crypto M5 Data

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/expand-crypto-data-DwV6r'
    paths:
      - '.github/workflows/backfill-crypto.yml'
      - 'backfill_crypto.py'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Diagnose and write report
        run: |
          exec > diagnostic_report.txt 2>&1

          echo "=== NETWORK DIAGNOSTICS ==="
          echo "Date: $(date -u)"
          echo ""

          echo "--- Binance API ping ---"
          curl -s -w "\nHTTP_CODE: %{http_code}\n" "https://api.binance.com/api/v3/ping"
          echo ""

          echo "--- Binance klines (2 bars) ---"
          curl -s -w "\nHTTP_CODE: %{http_code}\n" "https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=5m&limit=2"
          echo ""

          echo "--- data.binance.vision (HEAD) ---"
          curl -sI "https://data.binance.vision/data/spot/monthly/klines/BTCUSDT/5m/BTCUSDT-5m-2025-04.zip" | head -10
          echo ""

          echo "--- CryptoCompare (2 bars) ---"
          curl -s -w "\nHTTP_CODE: %{http_code}\n" "https://min-api.cryptocompare.com/data/v2/histominute?fsym=BTC&tsym=USDT&limit=2"
          echo ""

          echo "--- Python test: Binance klines ---"
          python3 -c "
          import requests
          r = requests.get('https://api.binance.com/api/v3/klines', params={'symbol':'BTCUSDT','interval':'5m','limit':2}, timeout=10)
          print(f'Status: {r.status_code}')
          print(f'Body: {r.text[:500]}')
          " || echo "Python test FAILED"

          echo ""
          echo "=== END DIAGNOSTICS ==="

      - name: Run crypto backfill
        run: |
          python backfill_crypto.py \
            --source binance \
            --data-dir Fetched_Data \
            --also-update-fetched-data \
            2>&1 | tee backfill_output.log || true

      - name: Generate file report
        if: always()
        run: |
          {
            echo ""
            echo "=== FILE REPORT ==="
            echo ""
            echo "--- All files (excluding .git) ---"
            find . -not -path './.git/*' -type f | sort
            echo ""
            echo "--- Crypto files specifically ---"
            find . -name "*crypto*" -type f -ls 2>/dev/null || echo "NONE"
            echo ""
            echo "--- Fetched_Data/ ---"
            ls -la Fetched_Data/ 2>/dev/null || echo "Directory missing"
            echo ""
            echo "--- MarketPatterns_AI/Fetched_Data/ ---"
            ls -la MarketPatterns_AI/Fetched_Data/ 2>/dev/null || echo "Directory missing"
            echo ""
            echo "--- backfill_output.log (last 120 lines) ---"
            tail -120 backfill_output.log 2>/dev/null || echo "No output log"
            echo ""
            echo "--- backfill_crypto.log (last 120 lines) ---"
            tail -120 backfill_crypto.log 2>/dev/null || echo "No crypto log"
          } >> diagnostic_report.txt

      - name: Commit diagnostic report + any data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f diagnostic_report.txt
          git add -f Fetched_Data/ 2>/dev/null || true
          git add -f MarketPatterns_AI/Fetched_Data/ 2>/dev/null || true

          git commit -m "Diagnostic report from backfill workflow run"
          git push
