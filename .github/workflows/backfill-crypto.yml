name: Backfill Crypto M5 Data

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/expand-crypto-data-DwV6r'
    paths:
      - '.github/workflows/backfill-crypto.yml'
      - 'backfill_crypto.py'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Diagnose network connectivity
        run: |
          echo "=== Testing Binance API ==="
          curl -s -w "\nHTTP %{http_code}\n" "https://api.binance.com/api/v3/ping" || echo "FAILED"
          echo ""
          echo "=== Testing Binance klines ==="
          curl -s -w "\nHTTP %{http_code}\n" "https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=5m&limit=2" | head -200 || echo "FAILED"
          echo ""
          echo "=== Testing data.binance.vision ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" "https://data.binance.vision/data/spot/monthly/klines/BTCUSDT/5m/BTCUSDT-5m-2025-04.zip" || echo "FAILED"
          echo ""
          echo "=== Testing CryptoCompare ==="
          curl -s -w "\nHTTP %{http_code}\n" "https://min-api.cryptocompare.com/data/v2/histominute?fsym=BTC&tsym=USDT&limit=2" | head -200 || echo "FAILED"

      - name: Run crypto backfill
        run: |
          set -euo pipefail
          python backfill_crypto.py \
            --source binance \
            --data-dir Fetched_Data \
            --also-update-fetched-data
          echo "Script exit code: $?"

      - name: Show ALL files in workspace
        if: always()
        run: |
          echo "=== All files (excluding .git) ==="
          find . -not -path './.git/*' -type f | sort
          echo ""
          echo "=== Crypto-specific files ==="
          find . -name "*crypto*" -type f -ls 2>/dev/null || echo "None found"
          echo ""
          echo "=== Fetched_Data contents ==="
          ls -la Fetched_Data/ 2>/dev/null || echo "Directory does not exist"
          echo ""
          echo "=== MarketPatterns_AI/Fetched_Data contents ==="
          ls -la MarketPatterns_AI/Fetched_Data/ 2>/dev/null || echo "Directory does not exist"
          echo ""
          echo "=== Backfill log (last 100 lines) ==="
          tail -100 backfill_crypto.log 2>/dev/null || echo "No log file found"

      - name: Commit and push CSV data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Try adding with -f to override any gitignore rules
          git add -f Fetched_Data/ 2>/dev/null || true
          git add -f MarketPatterns_AI/Fetched_Data/ 2>/dev/null || true

          echo "=== Git status ==="
          git status

          echo "=== Staged changes ==="
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "Nothing new to commit"
            exit 0
          fi

          git commit -m "Add crypto M5 historical data (backfill via GitHub Actions)"

          echo "=== Pushing ==="
          git push
          echo "=== Done ==="
