name: Backfill Crypto M5 Data

on:
  workflow_dispatch:
    inputs:
      start_month:
        description: 'Start month (YYYY-MM)'
        required: false
        default: '2025-04'
      end_month:
        description: 'End month (YYYY-MM)'
        required: false
        default: '2026-03'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Run crypto backfill
        run: |
          python backfill_crypto.py \
            --source binance \
            --data-dir Fetched_Data \
            --also-update-fetched-data \
            --start-month "${{ github.event.inputs.start_month }}" \
            --end-month "${{ github.event.inputs.end_month }}"

      - name: Commit and push CSV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Fetched_Data/*crypto*.csv 2>/dev/null || true
          git add -f MarketPatterns_AI/Fetched_Data/*crypto*.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "Update crypto M5 data (${{ github.event.inputs.start_month }} to ${{ github.event.inputs.end_month }})"
          git push
